<h2 class="section-title">Liste de tous les véhicules</h2>
<div class="vehicule-grid">   
    
    <div *ngFor="let v of vehicules" class="vehicule-card">        
        
        <!-- IMAGE VEHICULE -->

        <a [routerLink]="['/vehicules', v.idVehicule]">        
            <img class="vehicule-image" [src]="v.imageUrl || 'assets/exemple-de-vehicule.jpg'" alt="Photo véhicule">        
        </a>


        <!-- HEADER -->
        <div class="vehicule-header">
            <h3>
                {{ v.marque }} {{ v.modele }}
            </h3>
            <span class="badge" [ngClass]="{
                    'vente': v.typeOffre.toLowerCase() === 'vente',
                    'location': v.typeOffre.toLowerCase() === 'location'
                }">            
                {{ v.typeOffre }}            
            </span>
        </div>

        <!-- BODY -->
        <div class="vehicule-body">
            <p>
                📅 Année :
                <strong>
                    {{ v.annee || 'N/A' }}
                </strong>
            </p>
            <p>
                🛣 Kilométrage :
                <strong>
                    {{ v.kilometrage || 'N/A' }} km
                </strong>
            </p>
            <p>
                🚘 Disponibilité :
                <strong>
                    {{ v.disponible ? 'Oui' : 'Non' }}
                </strong>
            </p>
            <p class="price">
                {{ v.prix | currency:'EUR' }}
            </p>
        </div>
    </div>
</div>
