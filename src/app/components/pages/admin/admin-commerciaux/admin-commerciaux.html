<div class="page">

    <div class="page-header">

        <div class="header-text">
            <h2>Commerciaux</h2>

            <p class="subtitle">
                Liste des commerciaux M-Motors
            </p>
        </div>

        <button class="create-btn" (click)="goCreate()">
            + Ajouter un commercial
        </button>

    </div>

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                    <th class="actions">Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let c of commerciaux">
                    <td>{{ c.idUser }}</td>
                    <td>{{ c.nom }}</td>
                    <td>{{ c.prenom }}</td>
                    <td>{{ c.email }}</td>
                    <td class="actions">
                        <button class="delete-btn" (click)="delete(c.idUser)">
                            Supprimer
                        </button>
                    </td>
                </tr>
            </tbody>

        </table>

        <p *ngIf="commerciaux.length === 0" class="empty">
            Aucun commercial trouvé
        </p>

    </div>

</div>
