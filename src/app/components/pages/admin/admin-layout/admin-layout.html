<div class="admin-container">

    <!-- SIDEBAR -->

        <div class="sidebar-header">
            <h2>M-Motors Admin</h2>
        </div>

        <nav class="menu">

            <a routerLink="dashboard" routerLinkActive="active">
                Dashboard
            </a>

            <a *ngIf="auth.isAdmin()" routerLink="users" routerLinkActive="active">
                Back-office
            </a>

            <a *ngIf="auth.isBackOffice()" routerLink="clients" routerLinkActive="active">
                Clients
            </a>

            <a *ngIf="auth.isCommercial()" routerLink="vehicules" routerLinkActive="active">

            </a>

            <a *ngIf="auth.isCommercial()" routerLink="dossier" routerLinkActive="active">
                Dossiers
            </a>

                Commerciaux
            </a>

            <!-- SECTION SYSTÈME -->
            <div class="menu-section">

                <a *ngIf="auth.isAdmin()" routerLink="logs" routerLinkActive="active">

                </a>

            </div>

    <!-- MAIN -->
    <div class="main">

        <section class="content">
            <router-outlet></router-outlet>
        </section>
