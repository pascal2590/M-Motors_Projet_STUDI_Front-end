<div class="page">

    <h2>Dossiers commerciaux</h2>

    <p class="subtitle">
        Liste des dossiers assignés aux commerciaux
    </p>

    <div class="card">

        <table *ngIf="dossiers.length > 0; else noData">
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Véhicule</th>
                <th>Status</th>
                <th>Type dossier</th>
                <th>Date création</th>
                <th>Actions</th>
            </tr>
        
            <tr *ngFor="let d of dossiers" [ngClass]="{
                  'status-accepted': d.status === 'accepte',
                  'status-pending': d.status === 'en_attente',
                  'status-refused': d.status === 'refuse'
                }">
                <td>{{ d.id }}</td>
                <td>{{ d.client }}</td>
                <td>{{ d.vehicule }}</td>
                <td>
                    <span class="status-badge">
                        {{ d.status }}
                    </span>
                </td>
                <td>{{ d.typeDossier }}</td>
                <td>{{ d.dateCreation }}</td>
                <td>
                    <button class="btn-view" (click)="goToDossier(d.id)">
                        Voir
                    </button>
                </td>
            </tr>
        </table>
        
        <ng-template #noData>
            <p>Aucun dossier trouvé</p>
        </ng-template>

    </div>

</div>
